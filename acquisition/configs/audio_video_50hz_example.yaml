# Example acquisition-side configuration.
# This file describes rig behavior, not post-hoc analysis expectations.

session:
  sync_rate_hz: 50

arduino:
  serial_port: COM3
  # These are calibrated rig values, not values automatically derived from
  # sync_rate_hz. Adjust them when camera timestamps show the pulse period is
  # not the intended 1 / sync_rate_hz.
  pulse_high_us: 9926
  pulse_low_us: 9926

video:
  frame_rate_hz: 50
  frame_width: 1616
  frame_height: 1240
  pixel_format: gray
  segment_seconds: null

paths:
  data_dir: E:/videos/test
  bonsai_exe: C:/Users/banerjeelab/AppData/Local/Bonsai/Bonsai.exe
  bonsai_workflow: C:/path/to/simple_acquisition.bonsai
