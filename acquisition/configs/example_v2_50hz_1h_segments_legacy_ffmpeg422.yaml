# Example acquisition-side configuration for the legacy FFmpeg 4.2.2 stack.
# This file describes rig behavior, not post-hoc analysis expectations.

session:
  sync_rate_hz: 50

paths:
  data_dir: D:/videos/test
  bonsai_exe: C:/Users/banerjeelab/AppData/Local/Bonsai/Bonsai.exe
  # This v2 config expects a Bonsai workflow with two camera boxes.
  bonsai_workflow: acquisition/bonsai/workflows/triggered_video_writer_v2.bonsai

video:
  frame_width: 1616
  frame_height: 1240
  input_pixel_format: bayer_rggb8
  # Output-side ffmpeg options used by the older acquisition workflow.
  ffmpeg_output_options:
    c:v: h264_nvenc
    profile:v: high
    preset: slow
  segment_seconds: 3600
  output_extension: mp4
  pipe_wait_timeout_s: 60
  cameras:
    - name: cam0
      serial_number: "20104308"
      # Must match the ImageWriter path in the Bonsai workflow.
      pipe_name: videopipe1
      enabled: true
    - name: cam1
      serial_number: "20181897"
      # Must match the ImageWriter path in the Bonsai workflow.
      pipe_name: videopipe2
      enabled: true
